<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Memory bank — ISS Meridian</title>
    <link rel="stylesheet" href="ship-pages.css">
    <style>
        body.ship-page--gallery .ship-page-header {
            max-width: 44rem;
        }

        .gal-main {
            max-width: 68rem;
            margin: 0 auto;
        }

        .gal-index-line {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem 1rem;
            margin: 0 0 1.1rem;
            padding: 0.5rem 0.65rem;
            font-family: Cinzel, serif;
            font-size: 0.58rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(201, 169, 98, 0.55);
            background: rgba(12, 9, 6, 0.55);
            border: 1px solid rgba(186, 146, 88, 0.22);
            border-radius: 3px;
        }

        .gal-index-line strong {
            font-weight: 600;
            color: rgba(232, 197, 110, 0.88);
            letter-spacing: 0.18em;
        }

        .gal-index-line span.sep {
            opacity: 0.35;
            letter-spacing: 0.08em;
        }

        .gal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(100%, 168px), 1fr));
            gap: clamp(0.65rem, 2vw, 1rem);
        }

        @media (min-width: 520px) {
            .gal-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }

        .gal-card {
            position: relative;
            margin: 0;
            aspect-ratio: 4 / 3;
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid rgba(186, 146, 88, 0.32);
            box-shadow:
                0 4px 24px rgba(25, 18, 12, 0.5),
                inset 0 1px 0 rgba(255, 248, 220, 0.06);
            cursor: default;
            outline: none;
            touch-action: manipulation;
            transition:
                transform 0.45s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.45s ease,
                border-color 0.35s ease;
            animation: gal-card-reveal 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .gal-card:nth-child(1) { animation-delay: 0.04s; }
        .gal-card:nth-child(2) { animation-delay: 0.08s; }
        .gal-card:nth-child(3) { animation-delay: 0.12s; }
        .gal-card:nth-child(4) { animation-delay: 0.16s; }
        .gal-card:nth-child(5) { animation-delay: 0.2s; }
        .gal-card:nth-child(6) { animation-delay: 0.24s; }
        .gal-card:nth-child(7) { animation-delay: 0.28s; }
        .gal-card:nth-child(8) { animation-delay: 0.32s; }
        .gal-card:nth-child(9) { animation-delay: 0.36s; }
        .gal-card:nth-child(10) { animation-delay: 0.4s; }
        .gal-card:nth-child(11) { animation-delay: 0.44s; }
        .gal-card:nth-child(12) { animation-delay: 0.48s; }
        .gal-card:nth-child(13) { animation-delay: 0.52s; }
        .gal-card:nth-child(14) { animation-delay: 0.56s; }
        .gal-card:nth-child(15) { animation-delay: 0.6s; }
        .gal-card:nth-child(16) { animation-delay: 0.64s; }
        .gal-card:nth-child(17) { animation-delay: 0.68s; }
        .gal-card:nth-child(18) { animation-delay: 0.72s; }
        .gal-card:nth-child(19) { animation-delay: 0.76s; }
        .gal-card:nth-child(20) { animation-delay: 0.8s; }
        .gal-card:nth-child(21) { animation-delay: 0.84s; }
        .gal-card:nth-child(22) { animation-delay: 0.88s; }
        .gal-card:nth-child(23) { animation-delay: 0.92s; }
        .gal-card:nth-child(24) { animation-delay: 0.96s; }

        @keyframes gal-card-reveal {
            from {
                opacity: 0;
                transform: translateY(14px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @media (hover: hover) and (pointer: fine) {
            .gal-card:hover {
                transform: translateY(-5px) scale(1.02);
                border-color: rgba(232, 197, 110, 0.45);
                box-shadow:
                    0 14px 40px rgba(25, 18, 12, 0.55),
                    0 0 0 1px rgba(201, 169, 98, 0.15),
                    inset 0 1px 0 rgba(255, 248, 220, 0.1);
            }
        }

        .gal-card:focus-visible {
            transform: translateY(-3px);
            border-color: rgba(232, 197, 110, 0.75);
            box-shadow:
                0 0 0 2px rgba(18, 12, 8, 0.95),
                0 0 0 4px rgba(201, 169, 98, 0.55),
                0 12px 32px rgba(25, 18, 12, 0.45);
        }

        .gal-card__viz {
            position: absolute;
            inset: 0;
        }

        /* Holo-still scan texture */
        .gal-card__viz::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.12;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.45) 2px,
                rgba(0, 0, 0, 0.45) 3px
            );
            mix-blend-mode: overlay;
        }

        .gal-card__viz::after {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            opacity: 0.35;
            background: radial-gradient(ellipse 100% 80% at 50% 0%, rgba(255, 248, 235, 0.08), transparent 55%);
            mix-blend-mode: soft-light;
        }

        .gal-card__meta {
            position: absolute;
            top: 0.35rem;
            left: 0.35rem;
            z-index: 3;
            padding: 0.15rem 0.35rem;
            font-family: Cinzel, serif;
            font-size: 0.48rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            color: rgba(232, 197, 110, 0.65);
            background: rgba(8, 6, 4, 0.65);
            border: 1px solid rgba(201, 169, 98, 0.2);
            border-radius: 2px;
        }

        .gal-card__cap {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 4;
            padding: 0.45rem 0.5rem 0.4rem;
            font-family: Cinzel, serif;
            font-size: 0.55rem;
            letter-spacing: 0.1em;
            line-height: 1.35;
            text-transform: uppercase;
            color: #f2e8d4;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.85);
            background: linear-gradient(0deg, rgba(18, 12, 8, 0.94) 0%, rgba(18, 12, 8, 0.5) 55%, transparent 100%);
        }

        .gal-card--nebula .gal-card__viz {
            background:
                radial-gradient(ellipse 80% 60% at 30% 40%, rgba(255, 120, 200, 0.52) 0%, transparent 52%),
                radial-gradient(ellipse 70% 50% at 70% 60%, rgba(100, 200, 255, 0.48) 0%, transparent 52%),
                radial-gradient(circle at 50% 50%, #1a1030 0%, #050810 100%);
            animation: gal-nebula-drift 14s ease-in-out infinite alternate;
        }

        @keyframes gal-nebula-drift {
            from {
                filter: hue-rotate(0deg) saturate(1);
            }
            to {
                filter: hue-rotate(12deg) saturate(1.08);
            }
        }

        .gal-card--rings .gal-card__viz {
            background:
                radial-gradient(ellipse 100% 38% at 50% 50%, transparent 38%, rgba(200, 180, 140, 0.42) 39.5%, transparent 41%),
                radial-gradient(ellipse 85% 28% at 50% 50%, transparent 35%, rgba(180, 160, 120, 0.22) 36%, transparent 38%),
                radial-gradient(circle at 50% 50%, #c4a882 0%, #4a3828 70%, #1a1410 100%);
        }

        .gal-card--sun .gal-card__viz {
            background:
                radial-gradient(circle at 50% 50%, #fff8e0 0%, #f4d76a 25%, #c9a227 45%, #5c3d1e 100%);
            box-shadow: inset 0 0 48px rgba(255, 200, 100, 0.42);
            animation: gal-sun-breathe 5s ease-in-out infinite;
        }

        @keyframes gal-sun-breathe {
            0%, 100% {
                filter: brightness(1);
            }
            50% {
                filter: brightness(1.06);
            }
        }

        .gal-card--ice .gal-card__viz {
            background:
                linear-gradient(145deg, #1e3a5c 0%, #3d78b8 38%, #6ec8d0 72%, #a8e8f0 100%);
        }

        .gal-card--void .gal-card__viz {
            background:
                radial-gradient(1px 1px at 20% 30%, rgba(255, 255, 255, 0.35), transparent),
                radial-gradient(1px 1px at 78% 22%, rgba(200, 220, 255, 0.25), transparent),
                radial-gradient(1px 1px at 55% 70%, rgba(255, 255, 255, 0.2), transparent),
                radial-gradient(1px 1px at 12% 82%, rgba(255, 250, 220, 0.18), transparent),
                repeating-conic-gradient(from 0deg at 50% 50%, #100c08 0deg 4deg, #1a1610 4deg 8deg);
            opacity: 0.97;
        }

        .gal-card--station .gal-card__viz {
            background:
                linear-gradient(90deg, #1e1810 0%, #2a2418 30%, #1e1810 60%, #12100c 100%);
            background-size: 8px 100%;
            box-shadow: inset 0 0 0 1px rgba(40, 32, 24, 0.5);
        }

        .gal-card--station .gal-card__viz::after {
            background:
                radial-gradient(ellipse 100% 80% at 50% 0%, rgba(255, 248, 235, 0.06), transparent 55%),
                linear-gradient(180deg, transparent 40%, rgba(201, 169, 98, 0.06) 100%);
        }

        .gal-card--station .gal-card__ring {
            position: absolute;
            inset: 20%;
            z-index: 1;
            border: 1px solid rgba(201, 169, 98, 0.38);
            border-radius: 3px;
            box-shadow:
                0 0 24px rgba(201, 169, 98, 0.14),
                inset 0 0 20px rgba(0, 0, 0, 0.35);
            pointer-events: none;
        }

        .gal-card--aurora .gal-card__viz {
            background:
                radial-gradient(ellipse 100% 45% at 50% 100%, rgba(160, 220, 140, 0.32) 0%, transparent 58%),
                radial-gradient(ellipse 70% 35% at 35% 88%, rgba(201, 169, 98, 0.28) 0%, transparent 52%),
                radial-gradient(ellipse 60% 25% at 72% 85%, rgba(120, 180, 220, 0.2) 0%, transparent 48%),
                linear-gradient(180deg, #100c08 0%, #1c1610 100%);
            animation: gal-aurora-shift 18s ease-in-out infinite alternate;
        }

        @keyframes gal-aurora-shift {
            from {
                filter: hue-rotate(-6deg);
            }
            to {
                filter: hue-rotate(10deg);
            }
        }

        .gal-card--ghost {
            border-color: rgba(200, 100, 140, 0.35);
        }

        .gal-card--ghost .gal-card__viz {
            animation: gal-ghost-drift 10s ease-in-out infinite alternate;
        }

        @keyframes gal-ghost-drift {
            from {
                filter: hue-rotate(125deg) saturate(1.05);
            }
            to {
                filter: hue-rotate(165deg) saturate(1.18);
            }
        }

        .gal-card--ghost .gal-card__meta {
            color: rgba(255, 160, 180, 0.85);
            border-color: rgba(200, 100, 120, 0.35);
        }

        .gal-card--ghost:hover {
            border-color: rgba(255, 140, 170, 0.5);
        }

        /* Gas giant — banded atmosphere */
        .gal-card--storm .gal-card__viz {
            background:
                radial-gradient(ellipse 70% 45% at 42% 38%, rgba(255, 236, 200, 0.22), transparent 55%),
                repeating-linear-gradient(
                    180deg,
                    #c2a078 0px,
                    #c2a078 7px,
                    #8a7055 7px,
                    #8a7055 13px,
                    #d8c8a8 13px,
                    #d8c8a8 21px,
                    #5c4c3c 21px,
                    #5c4c3c 28px,
                    #a89878 28px,
                    #a89878 36px
                ),
                #2a2418;
        }

        /* Comet — nucleus and ion tail */
        .gal-card--comet .gal-card__viz {
            background:
                linear-gradient(
                    118deg,
                    rgba(255, 255, 255, 0.92) 0%,
                    rgba(210, 228, 255, 0.45) 6%,
                    rgba(90, 150, 230, 0.22) 22%,
                    rgba(40, 80, 160, 0.08) 38%,
                    transparent 52%
                ),
                radial-gradient(circle at 17% 36%, #f6f8ff 0%, #c8d4ec 14%, transparent 38%),
                #060814;
        }

        /* Close binary */
        .gal-card--binary .gal-card__viz {
            background:
                radial-gradient(circle at 34% 50%, #fff6e0 0%, #e8a038 16%, rgba(200, 100, 40, 0.35) 38%, transparent 48%),
                radial-gradient(circle at 69% 49%, #ffe8d8 0%, #e87850 18%, rgba(180, 60, 50, 0.28) 40%, transparent 48%),
                linear-gradient(180deg, #100818 0%, #060408 100%);
            animation: gal-binary-pulse 9s ease-in-out infinite alternate;
        }

        @keyframes gal-binary-pulse {
            from {
                filter: brightness(1);
            }
            to {
                filter: brightness(1.07);
            }
        }

        /* Accretion disk */
        .gal-card--accretion .gal-card__viz {
            background:
                conic-gradient(
                    from 25deg at 50% 50%,
                    transparent 0deg 28deg,
                    rgba(255, 140, 80, 0.55) 42deg,
                    rgba(255, 210, 120, 0.4) 78deg,
                    rgba(255, 100, 60, 0.35) 110deg,
                    transparent 130deg 360deg
                ),
                radial-gradient(circle at 50% 50%, #050308 0%, #120810 42%, #080408 100%);
        }

        /* Hab ring */
        .gal-card--hab .gal-card__viz {
            background:
                radial-gradient(ellipse 130% 38% at 50% 100%, rgba(90, 170, 95, 0.38), transparent 52%),
                radial-gradient(ellipse 70% 18% at 50% 82%, rgba(201, 169, 98, 0.2), transparent 60%),
                linear-gradient(180deg, #0a0e14 0%, #121820 100%);
            animation: gal-hab-flicker 12s ease-in-out infinite alternate;
        }

        @keyframes gal-hab-flicker {
            from {
                filter: hue-rotate(-4deg) saturate(1);
            }
            to {
                filter: hue-rotate(6deg) saturate(1.06);
            }
        }

        /* Relay lattice */
        .gal-card--relay .gal-card__viz {
            background:
                linear-gradient(108deg, transparent 47%, rgba(201, 169, 98, 0.14) 48.5%, rgba(201, 169, 98, 0.14) 51.5%, transparent 53%),
                linear-gradient(18deg, transparent 58%, rgba(201, 169, 98, 0.1) 59.5%, rgba(201, 169, 98, 0.1) 60.5%, transparent 62%),
                radial-gradient(1px 1px at 22% 32%, rgba(255, 248, 220, 0.55), transparent),
                radial-gradient(1px 1px at 76% 26%, rgba(180, 210, 255, 0.5), transparent),
                radial-gradient(1px 1px at 52% 58%, rgba(232, 197, 110, 0.48), transparent),
                radial-gradient(1px 1px at 38% 74%, rgba(255, 255, 255, 0.32), transparent),
                radial-gradient(1px 1px at 88% 68%, rgba(200, 230, 255, 0.28), transparent),
                #06080c;
        }

        /* Crystal field */
        .gal-card--crystal .gal-card__viz {
            background:
                linear-gradient(158deg, transparent 38%, rgba(190, 230, 255, 0.14) 39.5%, transparent 41%),
                linear-gradient(198deg, transparent 52%, rgba(160, 210, 255, 0.1) 53.5%, transparent 55%),
                radial-gradient(ellipse 55% 75% at 48% 58%, rgba(120, 190, 240, 0.28), transparent 68%),
                linear-gradient(180deg, #0c1218 0%, #081018 100%);
        }

        /* Rust world */
        .gal-card--rust .gal-card__viz {
            background:
                radial-gradient(ellipse 88% 65% at 48% 42%, #c4583c 0%, #8a3220 35%, #4a1a12 78%, #120808 100%);
            box-shadow: inset 0 0 36px rgba(80, 30, 20, 0.35);
        }

        /* Red dwarf */
        .gal-card--dwarf .gal-card__viz {
            background:
                radial-gradient(circle at 50% 50%, #ffd8b8 0%, #e87038 16%, #9a3018 38%, #1a0806 100%);
            animation: gal-dwarf-dim 11s ease-in-out infinite alternate;
        }

        @keyframes gal-dwarf-dim {
            from {
                filter: brightness(1);
            }
            to {
                filter: brightness(0.93);
            }
        }

        /* Haze moon */
        .gal-card--titan .gal-card__viz {
            background:
                radial-gradient(ellipse 100% 68% at 50% 54%, rgba(255, 175, 85, 0.48) 0%, rgba(195, 115, 45, 0.28) 38%, rgba(72, 48, 32, 0.9) 100%),
                linear-gradient(180deg, #c09055 0%, #5a3828 42%, #1c100c 100%);
        }

        /* Approach strip */
        .gal-card--runway .gal-card__viz {
            background:
                linear-gradient(90deg, transparent 46.5%, rgba(255, 248, 210, 0.65) 48.2%, rgba(255, 248, 210, 0.65) 51.8%, transparent 53.5%),
                linear-gradient(90deg, transparent 40%, rgba(232, 197, 110, 0.22) 41.2%, rgba(232, 197, 110, 0.22) 42.2%, transparent 43.2%),
                linear-gradient(90deg, transparent 57.8%, rgba(232, 197, 110, 0.22) 58.8%, rgba(232, 197, 110, 0.22) 59.8%, transparent 60.8%),
                linear-gradient(180deg, #060810 0%, #101828 48%, #182838 100%);
        }

        /* Gravitational lens arc */
        .gal-card--fold .gal-card__viz {
            background:
                radial-gradient(ellipse 72% 92% at 50% 50%, transparent 45%, rgba(195, 175, 255, 0.32) 48.5%, rgba(238, 220, 255, 0.52) 50%, rgba(195, 175, 255, 0.32) 51.5%, transparent 54%),
                radial-gradient(circle at 50% 50%, #140c20 0%, #060408 100%);
        }

        /* Veil nebula */
        .gal-card--veil .gal-card__viz {
            background:
                radial-gradient(ellipse 88% 52% at 62% 38%, rgba(220, 130, 210, 0.4) 0%, transparent 54%),
                radial-gradient(ellipse 68% 48% at 26% 58%, rgba(150, 195, 255, 0.32) 0%, transparent 52%),
                radial-gradient(circle at 50% 50%, #160818 0%, #050306 100%);
            animation: gal-veil-drift 16s ease-in-out infinite alternate;
        }

        @keyframes gal-veil-drift {
            from {
                filter: hue-rotate(-8deg);
            }
            to {
                filter: hue-rotate(10deg);
            }
        }

        /* Photon sail */
        .gal-card--sails .gal-card__viz {
            background:
                linear-gradient(122deg, rgba(255, 252, 238, 0.52) 0%, rgba(228, 215, 175, 0.14) 26%, transparent 46%),
                repeating-linear-gradient(122deg, transparent, transparent 3px, rgba(201, 169, 98, 0.07) 3px, rgba(201, 169, 98, 0.07) 4px),
                linear-gradient(180deg, #0a0c16 0%, #100e14 100%);
            animation: gal-sail-shim 14s ease-in-out infinite alternate;
        }

        @keyframes gal-sail-shim {
            from {
                filter: brightness(1);
            }
            to {
                filter: brightness(1.11);
            }
        }

        /* Pressure ocean */
        .gal-card--depth .gal-card__viz {
            background:
                radial-gradient(ellipse 78% 48% at 46% 36%, rgba(70, 195, 215, 0.18), transparent 54%),
                linear-gradient(180deg, #081420 0%, #0e2840 38%, #061018 100%);
        }

        /* Eclipse corona */
        .gal-card--eclipse .gal-card__viz {
            background:
                radial-gradient(circle at 50% 50%, #080818 0%, #080818 41%, rgba(170, 205, 255, 0.42) 45.5%, rgba(255, 252, 248, 0.88) 49%, rgba(255, 252, 248, 0.88) 51%, rgba(170, 205, 255, 0.42) 54.5%, #080818 59%, #030306 100%);
        }

        body.ship-page[data-theme="light"] .gal-index-line {
            color: rgba(92, 61, 30, 0.65);
            background: rgba(255, 252, 246, 0.72);
            border-color: rgba(130, 95, 55, 0.28);
        }

        body.ship-page[data-theme="light"] .gal-index-line strong {
            color: #6b4a28;
        }

        body.ship-page[data-theme="light"] .gal-card {
            border-color: rgba(120, 95, 58, 0.32);
            box-shadow:
                0 4px 18px rgba(90, 60, 28, 0.14),
                inset 0 1px 0 rgba(255, 255, 255, 0.35);
        }

        body.ship-page[data-theme="light"] .gal-card:hover {
            box-shadow:
                0 14px 36px rgba(90, 60, 28, 0.18),
                0 0 0 1px rgba(201, 169, 98, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.45);
        }

        body.ship-page[data-theme="light"] .gal-card__cap {
            color: #fdf8f0;
            background: linear-gradient(0deg, rgba(55, 38, 22, 0.88) 0%, rgba(55, 38, 22, 0.4) 55%, transparent 100%);
        }

        body.ship-page[data-theme="light"] .gal-card__meta {
            color: rgba(90, 62, 32, 0.85);
            background: rgba(255, 252, 246, 0.82);
            border-color: rgba(130, 95, 55, 0.28);
        }

        body.ship-page[data-theme="light"] .gal-card--ghost .gal-card__meta {
            color: #8b3a4a;
            border-color: rgba(180, 90, 100, 0.35);
        }

        @media (prefers-reduced-motion: reduce) {
            .gal-card {
                animation: none;
                opacity: 1;
                transform: none;
            }

            .gal-card:hover,
            .gal-card:focus-visible {
                transform: none;
            }

            .gal-card--nebula .gal-card__viz,
            .gal-card--sun .gal-card__viz,
            .gal-card--aurora .gal-card__viz,
            .gal-card--ghost .gal-card__viz,
            .gal-card--binary .gal-card__viz,
            .gal-card--hab .gal-card__viz,
            .gal-card--dwarf .gal-card__viz,
            .gal-card--veil .gal-card__viz,
            .gal-card--sails .gal-card__viz {
                animation: none !important;
                filter: hue-rotate(140deg) saturate(1.1);
            }
        }

        /* Viewport scrollbar on html/body inside iframe, not only descendants (ship-pages * omits document root). */
        html {
            color-scheme: dark;
        }

        html[data-theme="light"] {
            color-scheme: light;
        }

        html,
        body.ship-page.ship-page--gallery,
        body.ship-page.ship-page--gallery * {
            scrollbar-width: thin;
            scrollbar-color: rgba(201, 169, 98, 0.68) rgba(12, 9, 6, 0.9);
        }

        html::-webkit-scrollbar,
        body.ship-page.ship-page--gallery::-webkit-scrollbar,
        body.ship-page.ship-page--gallery *::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        html::-webkit-scrollbar-track,
        body.ship-page.ship-page--gallery::-webkit-scrollbar-track,
        body.ship-page.ship-page--gallery *::-webkit-scrollbar-track {
            background: rgba(10, 8, 6, 0.78);
            border-radius: 4px;
            box-shadow: inset 0 0 0 1px rgba(186, 146, 88, 0.2);
        }

        html::-webkit-scrollbar-thumb,
        body.ship-page.ship-page--gallery::-webkit-scrollbar-thumb,
        body.ship-page.ship-page--gallery *::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(212, 184, 120, 0.9) 0%, rgba(154, 114, 40, 0.88) 45%, rgba(74, 52, 28, 0.9) 100%);
            border-radius: 4px;
            border: 1px solid rgba(22, 16, 11, 0.7);
        }

        @media (max-width: 420px) {

                max-width: 100%;
            }

            .gal-grid {

        }
    </style>
</head>
